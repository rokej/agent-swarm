---
# ServiceAccount for the swarmer dashboard pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarmer
  namespace: swarmer

---
# ClusterRole: swarmer must manage resources across ALL workspace namespaces,
# not just its own — it creates namespaces, secrets, PVCs, pods and services
# on behalf of the user.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swarmer
rules:
  # Namespace management (creating/deleting workspaces)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Secret management (opencode-secret*, crush-secret*, github-pat-*, mcp-server-tokens*, swarmer-agent-extra-env, …)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # PVC management (session workspace storage)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Pod management (session execution)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "pods/portforward"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Service management (interactive/server-mode sessions)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ConfigMap management (agent tool config per workspace namespace)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch", "delete"]

  # RoleBinding management — used to grant the OpenShift anyuid SCC to the
  # default SA in workspace namespaces (matches what `oc adm policy add-scc-to-user`
  # does on OpenShift 4.x).  No-op on kind/k3s where the anyuid ClusterRole
  # does not exist.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "create", "update", "patch", "delete"]

  # OpenShift SCC — swarmer must hold "use" on the anyuid SCC so that
  # RBAC escalation checks allow it to create RoleBindings granting
  # anyuid to workspace default SAs.  No-op on non-OpenShift clusters.
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["anyuid"]
    verbs: ["use"]

  # Token validation (validating user bearer tokens at login)
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]

  # OpenShift Routes — expose server-mode sessions directly to the browser.
  # No-op on kind/k3s where the route.openshift.io CRD does not exist.
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: swarmer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: swarmer
subjects:
  - kind: ServiceAccount
    name: swarmer
    namespace: swarmer

---
# Minimal ClusterRole for swarmer dashboard users.
# Bind this as a RoleBinding (not ClusterRoleBinding) in specific workspace
# namespaces to grant a user visibility into those namespaces only.
# Use: make grant-workspace SA_USER=<name> WORKSPACE_NS=<namespace>
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swarmer-user
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
